<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Invalid and lawful routes from a complex matrix to a normalized phase coordinate</title>
  <desc id="desc">A red dashed route shows that dividing a determinant by pi does not create a phase. A blue and teal route passes through determinant, phase normalization into U(1), a quotient phase class, and a pi-normalized coordinate. Singular matrices are excluded at the normalization boundary.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#17324d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#146c94"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b42338"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, Segoe UI, Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #52677c; }
      .label { font: 700 21px Inter, Segoe UI, Arial, sans-serif; fill: #17324d; }
      .math { font: 600 23px Cambria Math, STIX Two Math, Georgia, serif; fill: #102a43; }
      .small { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #52677c; }
      .edge { font: 600 15px Inter, Segoe UI, Arial, sans-serif; fill: #146c94; }
      .bad { font: 650 17px Inter, Segoe UI, Arial, sans-serif; fill: #8f1d2c; }
    </style>
  </defs>

  <rect width="1600" height="720" rx="24" fill="url(#bg)"/>
  <text x="70" y="66" class="title">Matrix → phase: a failed cast and a lawful reroute</text>
  <text x="70" y="100" class="subtitle">Arithmetic validity does not supply phase semantics; an explicit partial translator does.</text>

  <text x="72" y="169" class="label">Lawful typed route</text>

  <g filter="url(#shadow)">
    <rect x="70" y="205" width="210" height="112" rx="18" fill="#ffffff" stroke="#8db5cc" stroke-width="2"/>
    <rect x="340" y="205" width="215" height="112" rx="18" fill="#ffffff" stroke="#8db5cc" stroke-width="2"/>
    <rect x="615" y="205" width="255" height="112" rx="18" fill="#eaf7fb" stroke="#2f8aa8" stroke-width="2.5"/>
    <rect x="930" y="205" width="245" height="112" rx="18" fill="#e9f8f2" stroke="#23856d" stroke-width="2.5"/>
    <rect x="1235" y="205" width="295" height="112" rx="18" fill="#f1f0fb" stroke="#6d5cae" stroke-width="2.5"/>
  </g>

  <text x="175" y="260" text-anchor="middle" class="math">A ∈ Mₙ(ℂ)</text>
  <text x="175" y="290" text-anchor="middle" class="small">complex matrix</text>

  <text x="447" y="260" text-anchor="middle" class="math">det A ∈ ℂ</text>
  <text x="447" y="290" text-anchor="middle" class="small">complex scalar</text>

  <text x="742" y="252" text-anchor="middle" class="math">u(A) = det A / |det A|</text>
  <text x="742" y="284" text-anchor="middle" class="small">unit phase in U(1)</text>

  <text x="1052" y="246" text-anchor="middle" class="math">[θ_A] = [arg det A]</text>
  <text x="1052" y="276" text-anchor="middle" class="math">∈ ℝ / 2πℤ</text>
  <text x="1052" y="304" text-anchor="middle" class="small">phase class</text>

  <text x="1382" y="248" text-anchor="middle" class="math">[arg det A / π]</text>
  <text x="1382" y="281" text-anchor="middle" class="math">∈ ℝ / 2ℤ</text>
  <text x="1382" y="307" text-anchor="middle" class="small">normalized phase class</text>

  <path d="M280 261 L329 261" stroke="#146c94" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M555 261 L604 261" stroke="#146c94" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M870 261 L919 261" stroke="#146c94" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M1175 261 L1224 261" stroke="#146c94" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <text x="304" y="240" text-anchor="middle" class="edge">det</text>
  <text x="580" y="240" text-anchor="middle" class="edge">normalize</text>
  <text x="895" y="240" text-anchor="middle" class="edge">phase class</text>
  <text x="1200" y="240" text-anchor="middle" class="edge">π-normalize</text>

  <text x="72" y="397" class="label">Rejected direct interpretation</text>
  <g filter="url(#shadow)">
    <rect x="70" y="430" width="330" height="112" rx="18" fill="#ffffff" stroke="#d5a0aa" stroke-width="2"/>
    <rect x="700" y="430" width="330" height="112" rx="18" fill="#fff3f4" stroke="#b42338" stroke-width="2.5"/>
  </g>
  <text x="235" y="485" text-anchor="middle" class="math">det A / π ∈ ℂ</text>
  <text x="235" y="516" text-anchor="middle" class="small">still a complex scalar</text>
  <text x="865" y="481" text-anchor="middle" class="math">phase coordinate</text>
  <text x="865" y="514" text-anchor="middle" class="bad">semantic type not established</text>

  <path d="M400 486 C505 486 585 486 689 486" stroke="#b42338" stroke-width="4" stroke-dasharray="12 10" marker-end="url(#arrowRed)"/>
  <text x="548" y="461" text-anchor="middle" class="bad">÷ π is not a translator</text>
  <g transform="translate(548 486)">
    <circle r="21" fill="#fff" stroke="#b42338" stroke-width="3"/>
    <path d="M-9 -9 L9 9 M9 -9 L-9 9" stroke="#b42338" stroke-width="4" stroke-linecap="round"/>
  </g>

  <rect x="1095" y="420" width="435" height="136" rx="18" fill="#fff8e6" stroke="#c98819" stroke-width="2"/>
  <text x="1125" y="458" class="label" fill="#7a4c00">Boundary certificate</text>
  <text x="1125" y="492" class="small">If det A = 0, normalization by |det A| is undefined.</text>
  <text x="1125" y="520" class="small">The lawful route is partial and must stop or reroute.</text>

  <path d="M742 317 C742 365 1170 366 1170 410" fill="none" stroke="#c98819" stroke-width="2.5" stroke-dasharray="7 7"/>

  <rect x="70" y="620" width="1460" height="45" rx="12" fill="#17324d"/>
  <text x="800" y="649" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="650" fill="#ffffff">A failed arrow rejects an interpretation—not every expression upstream of it.</text>
</svg>
